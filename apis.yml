apis:
  - aid: realestateapi:realestateapi
    name: RealEstateAPI
    description: >-
      A unified property data API offering property search, detail records,
      comparables, automated valuations (AVM), parcel boundaries, MLS data,
      skip tracing, and involuntary lien records. Authenticates with an
      x-api-key header. The Property Search endpoint supports list building,
      counts, and rich filtering across location, property characteristics,
      financial criteria, and special-status flags such as pre-foreclosure,
      foreclosure, REO, auction, tax delinquent, cash buyer, and investor
      owned.
