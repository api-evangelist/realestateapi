aid: realestateapi
name: RealEstateAPI
description: >-
  RealEstateAPI.com offers expressive property data APIs designed for building
  prop-tech applications. The platform exposes nationwide US property records
  including ownership, valuations, MLS listings, comparables, parcel boundary
  data, skip tracing, and involuntary liens through a unified JSON REST API.
