naftiko: 1.0.0-alpha2
info:
  label: RealEstateAPI — Liens
  description: 'RealEstateAPI — Liens. 1 operations. Lead operation: Search involuntary liens. Self-contained Naftiko capability
    covering one Realestateapi business surface.'
  tags:
  - Realestateapi
  - Liens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REALESTATEAPI_API_KEY: REALESTATEAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: realestateapi-liens
    baseUri: https://api.realestateapi.com
    description: RealEstateAPI — Liens business capability. Self-contained, no shared references.
    resources:
    - name: v2-InvoluntaryLiens
      path: /v2/InvoluntaryLiens
      operations:
      - name: post
        method: POST
        description: Search involuntary liens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.REALESTATEAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: realestateapi-liens-rest
    port: 8080
    description: REST adapter for RealEstateAPI — Liens. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/involuntaryliens
      name: v2-involuntaryliens
      description: REST surface for v2-InvoluntaryLiens.
      operations:
      - method: POST
        name: post
        description: Search involuntary liens
        call: realestateapi-liens.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: realestateapi-liens-mcp
    port: 9090
    transport: http
    description: MCP adapter for RealEstateAPI — Liens. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-involuntary-liens
      description: Search involuntary liens
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: realestateapi-liens.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
